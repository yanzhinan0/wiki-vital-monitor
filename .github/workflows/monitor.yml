name: Monitor Wikipedia Vital Articles Level 1-3

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run monitor check (Level 1-3)
        run: |
          python3 vital_articles_monitor.py --run-once \
            --notify-serverchan "${{ secrets.SERVERCHAN_KEY }}"
      
      - name: Commit and push snapshots
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add va_monitor_data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "📸 Update VA snapshots $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
